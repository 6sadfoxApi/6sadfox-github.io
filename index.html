cat > index.html <<'EOF'
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>6SadFox | Home</title>
  <link rel="stylesheet" href="style.css?v=9" />
</head>

<body>
  <main class="container">

    <h1>&gt; AI Notes + Timeline</h1>

    <section class="terminal">
      <div class="terminal-bar">notes :: database + ai-timeline</div>

      <div class="terminal-content">
        <textarea id="noteInput" placeholder="Type note..."></textarea>

        <div class="button-row">
          <button id="saveNote">Save Note</button>
          <button id="clearNotes">Clear</button>
        </div>

        <p id="noteStatus">Ready.</p>

        <h2>AI Thinking Timeline</h2>
        <div id="thinkingTimeline"></div>

        <h2>Saved Notes</h2>
        <div id="notesList"></div>
      </div>
    </section>

  </main>

  <script src="script.js?v=9"></script>
</body>
</html>
EOF
